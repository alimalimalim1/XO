<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
.game{
    background: linear-gradient(#550000, #000000);
    width: auto;
    height: auto;
    padding: 7%;
}
.row{
    display: flex;
    justify-content: center; /* горизонталь */
    align-items: center;     /* вертикаль */
}
.bs{
    background: linear-gradient(#aa5500, #552200);
    border: #aaaa00 solid 5px;
    border-radius: 20px;
    width: 100px;
    height: 100px;
    margin: 5px;
    padding: 50px;
    color: #aa0000;
    -webkit-text-stroke: #aaaa00 2px;
    font-size: 100px;
    font-weight: 900;
    border-radius: 20px;
    transition: all 0.1s;
}
.bs:hover{
    cursor: pointer;
    transform: scale(1.1);
    background: linear-gradient(#ff9900, #994400);
    border: #ffff00 solid 5px;
    color: #ff0000;
    -webkit-text-stroke: #ffff00 2px;
}
.bs:active{
    cursor: wait;
    transform: scale(0.9);
    background: linear-gradient(#ffdd99, #ddaa99);
    border: #ffff99 solid 5px;
    color: #ff9999;
    -webkit-text-stroke: #ffff00 2px;
}
.btn{
    background: linear-gradient(#ff9900, #994400);
    border: #ffff00 solid 5px;
    justify-content: center; /* горизонталь */
    width: 500px;
    height: 100px;
    margin: 5px;
    color: #ff0000;
    -webkit-text-stroke: #ffff00 2px;
    font-size: 50px;
    font-weight: 900;
    border-radius: 20px;
    transition: all 0.1s;
}
.btn:hover{
    cursor: pointer;
    transform: scale(1.1);
}
.btn:active{
    cursor: wait;
    transform: scale(0.9);
}
</style>
<script>
function start(){
    location.reload()
}
var player = "O";
var win = false;
function cb(box){
    if (win == false){
        if (box.innerText != "") return
        box.innerText = player
        player == "O" ? player = "X" : player = "O";
        check();
    }
}
function check(){
    for (var i = 0; i <= 2; i++){

        var first = document.getElementById(i + "-0").innerHTML;
        var second = document.getElementById(i + "-1").innerHTML;
        var third = document.getElementById(i + "-2" ).innerHTML;

        if (first == "") continue;
        if (first == second && first == third) {
            alert("!!!   YOU WIN   !!!");
            win = true;
        }
    }
    for (var i = 0; i <= 2; i++){

        var first = document.getElementById("0-" + i).innerHTML;
        var second = document.getElementById("1-" + i).innerHTML;
        var third = document.getElementById("2-" + i).innerHTML;

        if (first == "") continue;
        if (first == second && first == third) {
            alert("!!!   YOU WIN   !!!");
            win = true;
        }
    }
    var d11 = document.getElementById("0-0").innerHTML;
    var d12 = document.getElementById("1-1").innerHTML;
    var d13 = document.getElementById("2-2").innerHTML;
    var d21 = document.getElementById("0-2").innerHTML;
    var d22 = document.getElementById("1-1").innerHTML;
    var d23 = document.getElementById("2-0").innerHTML;

    if (d11 != "" && d11 == d12 && d11 == d13) {
        alert("!!!   YOU WIN   !!!");
        win = true;
    }
    if (d21 != "" && d21 == d22 && d21 == d23) {
        alert("!!!   YOU WIN   !!!");
        win = true;
    }
}
</script>
<body>
    <div class="game">
        <button class="btn" onclick="start();">PRESS PLAY</button>
        <div class="row">
            <div id="0-0" class="bs" onclick="cb(this);"></div>
            <div id="1-0" class="bs" onclick="cb(this);"></div>
            <div id="2-0" class="bs" onclick="cb(this);"></div>
        </div>
        <div class="row">
            <div id="0-1" class="bs" onclick="cb(this);"></div>
            <div id="1-1" class="bs" onclick="cb(this);"></div>
            <div id="2-1" class="bs" onclick="cb(this);"></div>
        </div>
        <div class="row">
            <div id="0-2" class="bs" onclick="cb(this);"></div>
            <div id="1-2" class="bs" onclick="cb(this);"></div>
            <div id="2-2" class="bs" onclick="cb(this);"></div>
        </div>
    </div>
</body>
</html>
